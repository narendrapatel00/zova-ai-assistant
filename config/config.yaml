# Application Settings
app:
  name: "ZovaAI"
  version: "0.1.0"
  env: "development"

# Logger Configuration
logging:
  level: "INFO"
  log_file: "logs/assistant.log"
  max_bytes: 10485760 # 10MB
  backup_count: 5

# Audio Input & Recording settings
audio:
  sample_rate: 16000
  channels: 1
  chunk_size: 1280 # 80ms of audio at 16kHz
  device_index: null # Null uses default system recording device
  silence_threshold: 0.03
  silence_seconds: 1.5

# Wake Word Configuration (openWakeWord)
wakeword:
  model_path: "" # Empty loads default 'hey_jarvis'
  threshold: 0.5
  cooldown_seconds: 3.0
  enabled: true
  inference_interval_ms: 80

# Speech-to-Text (Whisper) Configuration
stt:
  enabled: true
  model_path: "models/whisper/ggml-base.en.bin"
  language: "en"
  threads: 4
  translate: false
  beam_size: 5
  temperature: 0.0

# Text-to-Speech (Piper) Configuration
tts:
  enabled: true
  executable_path: "bin/piper/piper.exe"
  model_path: "models/piper/en_US-lessac-medium.onnx"
  config_path: "models/piper/en_US-lessac-medium.onnx.json"
  output_dir: "temp/tts"
  min_chunk_chars: 20

# Setup Download Configuration
setup:
  piper_zip_url: "https://github.com/rhasspy/piper/releases/download/2023.11.14-2/piper_windows_amd64.zip"
  piper_voice_url: "https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/lessac/medium/en_US-lessac-medium.onnx"
  piper_voice_config_url: "https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/lessac/medium/en_US-lessac-medium.onnx.json"
  whisper_model_url: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin"

# Assistant Orchestrator Configuration
assistant:
  name: "Zova"
  wake_response: "Yes?"
  system_prompt: "prompts/system.txt"

# LLM (Local Ollama) Configuration
llm:
  provider: "ollama"
  host: "http://localhost:11434"
  model: "qwen3"
  timeout: 30.0
  temperature: 0.7
  max_tokens: 512
